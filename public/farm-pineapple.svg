<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c0"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8bc34a"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <pattern id="rows" x="0" y="0" width="32" height="24" patternUnits="userSpaceOnUse">
      <rect width="32" height="24" fill="none"/>
      <line x1="0" y1="12" x2="32" y2="12" stroke="#4a7c28" stroke-width="1.2" stroke-opacity="0.45"/>
    </pattern>
  </defs>

  <!-- Sky / background -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Ground plane -->
  <rect y="140" width="400" height="160" fill="url(#ground)"/>

  <!-- Row lines overlay -->
  <rect y="140" width="400" height="160" fill="url(#rows)"/>

  <!-- Pineapple plants (repeating grid) -->
  <!-- Row 1 -->
  <g id="pine" transform="translate(30,118)">
    <!-- Fruit body -->
    <ellipse cx="0" cy="0" rx="7" ry="9" fill="#f9a825"/>
    <!-- Diamond pattern on fruit -->
    <line x1="-4" y1="-3" x2="4" y2="-3" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.6"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.6"/>
    <line x1="-4" y1="3" x2="4" y2="3" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.6"/>
    <line x1="0" y1="-9" x2="-4" y2="-3" stroke="#e65100" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="0" y1="-9" x2="4" y2="-3" stroke="#e65100" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Crown leaves -->
    <path d="M0,-9 C-3,-18 -8,-20 -6,-14 C-4,-10 0,-9 0,-9 Z" fill="#388e3c"/>
    <path d="M0,-9 C3,-18 8,-20 6,-14 C4,-10 0,-9 0,-9 Z" fill="#43a047"/>
    <path d="M0,-9 C-1,-21 0,-24 1,-21 C1,-18 0,-9 0,-9 Z" fill="#2e7d32"/>
    <path d="M0,-9 C-6,-16 -10,-16 -8,-12 C-6,-9 0,-9 0,-9 Z" fill="#4caf50"/>
    <path d="M0,-9 C6,-16 10,-16 8,-12 C6,-9 0,-9 0,-9 Z" fill="#388e3c"/>
    <!-- Stem -->
    <line x1="0" y1="9" x2="0" y2="18" stroke="#5d4037" stroke-width="2"/>
    <!-- Base leaves -->
    <path d="M0,12 C-12,8 -14,4 -8,6 C-4,7 0,12 0,12 Z" fill="#4caf50"/>
    <path d="M0,12 C12,8 14,4 8,6 C4,7 0,12 0,12 Z" fill="#388e3c"/>
    <path d="M0,14 C-10,18 -12,22 -6,18 C-2,16 0,14 0,14 Z" fill="#43a047"/>
    <path d="M0,14 C10,18 12,22 6,18 C2,16 0,14 0,14 Z" fill="#2e7d32"/>
  </g>
  <use href="#pine" transform="translate(70,118)"/>
  <use href="#pine" transform="translate(110,118)"/>
  <use href="#pine" transform="translate(150,118)"/>
  <use href="#pine" transform="translate(190,118)"/>
  <use href="#pine" transform="translate(230,118)"/>
  <use href="#pine" transform="translate(270,118)"/>
  <use href="#pine" transform="translate(310,118)"/>
  <use href="#pine" transform="translate(350,118)"/>
  <use href="#pine" transform="translate(390,118)"/>

  <!-- Row 2 (slightly smaller, perspective) -->
  <g id="pine2" transform="translate(50,158) scale(0.82)">
    <ellipse cx="0" cy="0" rx="7" ry="9" fill="#fb8c00"/>
    <line x1="-4" y1="-3" x2="4" y2="-3" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.5"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.5"/>
    <line x1="-4" y1="3" x2="4" y2="3" stroke="#e65100" stroke-width="0.6" stroke-opacity="0.5"/>
    <path d="M0,-9 C-3,-18 -8,-20 -6,-14 C-4,-10 0,-9 0,-9 Z" fill="#33691e"/>
    <path d="M0,-9 C3,-18 8,-20 6,-14 C4,-10 0,-9 0,-9 Z" fill="#558b2f"/>
    <path d="M0,-9 C-1,-21 0,-24 1,-21 C1,-18 0,-9 0,-9 Z" fill="#1b5e20"/>
    <path d="M0,-9 C-6,-16 -10,-16 -8,-12 C-6,-9 0,-9 0,-9 Z" fill="#689f38"/>
    <path d="M0,-9 C6,-16 10,-16 8,-12 C6,-9 0,-9 0,-9 Z" fill="#33691e"/>
    <line x1="0" y1="9" x2="0" y2="18" stroke="#5d4037" stroke-width="2"/>
    <path d="M0,12 C-12,8 -14,4 -8,6 C-4,7 0,12 0,12 Z" fill="#689f38"/>
    <path d="M0,12 C12,8 14,4 8,6 C4,7 0,12 0,12 Z" fill="#33691e"/>
  </g>
  <use href="#pine2" transform="translate(90,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(130,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(170,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(210,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(250,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(290,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(330,158) scale(0.82)"/>
  <use href="#pine2" transform="translate(370,158) scale(0.82)"/>

  <!-- Row 3 (smaller still) -->
  <g id="pine3" transform="translate(30,187) scale(0.65)">
    <ellipse cx="0" cy="0" rx="7" ry="9" fill="#f9a825"/>
    <path d="M0,-9 C-3,-18 -8,-20 -6,-14 C-4,-10 0,-9 0,-9 Z" fill="#2e7d32"/>
    <path d="M0,-9 C3,-18 8,-20 6,-14 C4,-10 0,-9 0,-9 Z" fill="#388e3c"/>
    <path d="M0,-9 C-1,-21 0,-24 1,-21 C1,-18 0,-9 0,-9 Z" fill="#1b5e20"/>
    <line x1="0" y1="9" x2="0" y2="18" stroke="#5d4037" stroke-width="2"/>
    <path d="M0,12 C-12,8 -14,4 -8,6 C-4,7 0,12 0,12 Z" fill="#558b2f"/>
    <path d="M0,12 C12,8 14,4 8,6 C4,7 0,12 0,12 Z" fill="#2e7d32"/>
  </g>
  <use href="#pine3" transform="translate(62,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(94,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(126,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(158,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(190,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(222,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(254,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(286,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(318,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(350,187) scale(0.65)"/>
  <use href="#pine3" transform="translate(382,187) scale(0.65)"/>

  <!-- Horizon haze -->
  <rect y="130" width="400" height="18" fill="url(#sky)" opacity="0.35"/>

  <!-- Label pill -->
  <rect x="10" y="272" width="140" height="22" rx="11" fill="#1b5e20" fill-opacity="0.75"/>
  <text x="80" y="287" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">Pineapple Plantation</text>
</svg>
